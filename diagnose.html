<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Diagnose</title>
<style>
body{font-family:monospace;background:#0f172a;color:#e2e8f0;padding:30px;font-size:13px;line-height:1.8;}
.box{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:18px;margin-bottom:14px;}
.ok{color:#34d399;}
.bad{color:#f87171;}
h1{color:#fff;font-size:18px;margin-bottom:20px;}
pre{white-space:pre-wrap;word-break:break-all;font-size:11px;color:#94a3b8;max-height:150px;overflow-y:auto;}
</style></head>
<body>
<h1>🔍 Execution Hub — Firebase Diagnostic</h1>
<div id="output">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCQpHQb_j0pn2SRUmKR5wUGaf4bYH_3yi0",
  authDomain:"time-schedule-tracker.firebaseapp.com",
  projectId:"time-schedule-tracker",
  storageBucket:"time-schedule-tracker.firebasestorage.app",
  messagingSenderId:"67296866406",
  appId:"1:67296866406:web:7a7656b5f5b7ed20ec7da7"
});
const db = firebase.firestore();

async function diagnose(){
  const out = document.getElementById('output');
  let html = '';

  // Check tracker_v2 (source of truth)
  html += '<div class="box"><strong>📦 tracker_v2 (original source)</strong><br>';
  try{
    const s = await db.collection('tracker').doc('tracker_v2').get();
    if(s.exists){
      const d = s.data();
      html += `Members: <span class="${(d.members||[]).length>0?'ok':'bad'}">${(d.members||[]).length}</span><br>`;
      html += `Master Tasks: <span class="${(d.masterTasks||[]).length>0?'ok':'bad'}">${(d.masterTasks||[]).length}</span><br>`;
      html += `Activity Log: <span class="${(d.actLog||[]).length>0?'ok':'bad'}">${(d.actLog||[]).length}</span><br>`;
      html += `Daily Status dates: <span class="${Object.keys(d.dailyStatus||{}).length>0?'ok':'bad'}">${Object.keys(d.dailyStatus||{}).length}</span><br>`;
      html += `Passwords set: ${Object.keys(d.passwords||{}).length}<br>`;
    } else {
      html += '<span class="bad">Document does not exist</span>';
    }
  }catch(e){html += '<span class="bad">Error: '+e.message+'</span>';}
  html += '</div>';

  // Check eh_v1/config
  html += '<div class="box"><strong>📁 eh_v1/config</strong><br>';
  try{
    const s = await db.collection('eh_v1').doc('config').get();
    if(s.exists){
      const d = s.data();
      html += `Members: <span class="${(d.members||[]).length>0?'ok':'bad'}">${(d.members||[]).length}</span><br>`;
      html += `Passwords: ${Object.keys(d.passwords||{}).length}<br>`;
      html += `Restored at: ${d._restoredAt||d._migratedAt||'—'}<br>`;
    } else {
      html += '<span class="bad">Document does not exist</span>';
    }
  }catch(e){html += '<span class="bad">Error: '+e.message+'</span>';}
  html += '</div>';

  // Check eh_v1/tasks
  html += '<div class="box"><strong>📁 eh_v1/tasks</strong><br>';
  try{
    const s = await db.collection('eh_v1').doc('tasks').get();
    if(s.exists){
      const d = s.data();
      html += `Master Tasks: <span class="${(d.masterTasks||[]).length>0?'ok':'bad'}">${(d.masterTasks||[]).length}</span><br>`;
      html += `Leadership Activities: ${(d.masterLeadership||[]).length}<br>`;
      html += `Restored at: ${d._restoredAt||d._migratedAt||'—'}<br>`;
    } else {
      html += '<span class="bad">⚠️ DOCUMENT DOES NOT EXIST — this is the problem</span>';
    }
  }catch(e){html += '<span class="bad">Error: '+e.message+'</span>';}
  html += '</div>';

  // Check eh_v1/daily
  html += '<div class="box"><strong>📁 eh_v1/daily</strong><br>';
  try{
    const s = await db.collection('eh_v1').doc('daily').get();
    if(s.exists){
      const d = s.data();
      html += `Daily Status dates: <span class="${Object.keys(d.dailyStatus||{}).length>0?'ok':'bad'}">${Object.keys(d.dailyStatus||{}).length}</span><br>`;
      html += `Volume dates: ${Object.keys(d.volume||{}).length}<br>`;
      html += `Restored at: ${d._restoredAt||d._migratedAt||'—'}<br>`;
    } else {
      html += '<span class="bad">⚠️ DOCUMENT DOES NOT EXIST — this is the problem</span>';
    }
  }catch(e){html += '<span class="bad">Error: '+e.message+'</span>';}
  html += '</div>';

  // Check eh_v1/logs
  html += '<div class="box"><strong>📁 eh_v1/logs</strong><br>';
  try{
    const s = await db.collection('eh_v1').doc('logs').get();
    if(s.exists){
      const d = s.data();
      html += `Activity Log: <span class="${(d.actLog||[]).length>0?'ok':'bad'}">${(d.actLog||[]).length}</span><br>`;
      html += `Restored at: ${d._restoredAt||d._migratedAt||'—'}<br>`;
    } else {
      html += '<span class="bad">⚠️ DOCUMENT DOES NOT EXIST — this is the problem</span>';
    }
  }catch(e){html += '<span class="bad">Error: '+e.message+'</span>';}
  html += '</div>';

  out.innerHTML = html;
}
diagnose();
</script>
</body></html>
