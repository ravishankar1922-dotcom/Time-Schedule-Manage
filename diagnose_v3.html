<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Import Diagnostic</title>
<style>
body{font-family:monospace;background:#0f172a;color:#e2e8f0;padding:30px;font-size:13px;line-height:1.8;}
.box{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:18px;margin-bottom:14px;}
.ok{color:#34d399;}
.bad{color:#f87171;}
.warn{color:#fbbf24;}
h1{color:#fff;font-size:18px;margin-bottom:20px;}
pre{white-space:pre-wrap;word-break:break-all;font-size:10px;color:#94a3b8;max-height:400px;overflow-y:auto;background:#0f172a;padding:10px;border-radius:6px;margin-top:8px;}
</style></head>
<body>
<h1>🔍 Import Mismatch Diagnostic</h1>
<div id="output">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCQpHQb_j0pn2SRUmKR5wUGaf4bYH_3yi0",
  authDomain:"time-schedule-tracker.firebaseapp.com",
  projectId:"time-schedule-tracker",
  storageBucket:"time-schedule-tracker.firebasestorage.app",
  messagingSenderId:"67296866406",
  appId:"1:67296866406:web:7a7656b5f5b7ed20ec7da7"
});
const db = firebase.firestore();

async function diagnose(){
  const out = document.getElementById('output');
  let html = '';

  const tasksSnap = await db.collection('eh_v1').doc('tasks').get();
  const dailySnap = await db.collection('eh_v1').doc('daily').get();
  const logsSnap = await db.collection('eh_v1').doc('logs').get();

  const tasks = (tasksSnap.data()||{}).masterTasks || [];
  const dailyStatus = (dailySnap.data()||{}).dailyStatus || {};
  const logs = (logsSnap.data()||{}).actLog || [];

  html += `<div class="box"><strong>📋 eh_v1/tasks summary</strong><br>Total master tasks now: <span class="ok">${tasks.length}</span></div>`;

  // Show first 3 task names/company/dept exactly as stored
  html += '<div class="box"><strong>🔬 First 3 NEW tasks — exact name/company/dept</strong><br>';
  tasks.slice(0,3).forEach(t=>{
    html += `<pre>name: "${t.name}"\ncompany: "${t.company}"\ndept: "${t.dept}"\nid: ${t.id}</pre><br>`;
  });
  html += '</div>';

  // Show all dailyStatus dates and how many tasks each has
  html += '<div class="box"><strong>📅 dailyStatus — dates and entry counts</strong><br>';
  Object.entries(dailyStatus).forEach(([dk,dayData])=>{
    const entries = Object.keys(dayData||{});
    const doneCount = entries.filter(id=>dayData[id]?.status==='done').length;
    html += `${dk}: ${entries.length} entries, ${doneCount} marked done<br>`;
  });
  html += '</div>';

  // Show 2026-06-30 entries with their stored "name signature" if any
  html += '<div class="box"><strong>🔬 2026-06-30 dailyStatus — raw entries (first 5)</strong><br>';
  const todayData = dailyStatus['2026-06-30'] || {};
  const todayIds = Object.keys(todayData).slice(0,5);
  todayIds.forEach(id=>{
    html += `<pre>taskId: ${id}\n${JSON.stringify(todayData[id], null, 2)}</pre><br>`;
  });
  if(todayIds.length===0) html += '<span class="bad">No entries found for 2026-06-30 at all!</span>';
  html += '</div>';

  // Check if any of today's task IDs exist in the NEW tasks array
  html += '<div class="box"><strong>🔎 Cross-check: do completed task IDs exist in NEW masterTasks?</strong><br>';
  const newTaskIds = new Set(tasks.map(t=>t.id));
  let matchCount = 0, mismatchCount = 0;
  Object.keys(todayData).forEach(id=>{
    if(newTaskIds.has(id)) matchCount++;
    else mismatchCount++;
  });
  html += `Matching IDs (correctly linked): <span class="ok">${matchCount}</span><br>`;
  html += `Orphaned IDs (NOT in new task list): <span class="bad">${mismatchCount}</span><br>`;
  html += '</div>';

  // Show recent import-related log entries
  html += '<div class="box"><strong>📝 Recent import log entries</strong><br>';
  const importLogs = logs.filter(l=>l.msg.includes('imported')||l.msg.includes('replaced')).slice(0,5);
  importLogs.forEach(l=>{
    html += `${l.time}: ${l.msg}<br>`;
  });
  html += '</div>';

  out.innerHTML = html;
}
diagnose();
</script>
</body></html>
